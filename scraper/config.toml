# ---------------------------------------------------------------------------
# WAF / indeterminación — triggers por patrón (no por tag individual)
# ---------------------------------------------------------------------------
[waf_patterns]
body_substrings = ["Incapsula", "Access Denied", "403 Forbidden", "Attention Required"]
header_values = ["cf-ray"]
blocking_status_codes = [403, 502, 503, 429]

# WAF selectivo por path (Senado bloquea ciertas legislaturas)
[waf_patterns.path_blocking]
blocked_patterns = [
    "/informacion/votaciones/LX",
    "/informacion/votaciones/LXIII",
    "/informacion/votaciones/LXIV",
    "/informacion/votaciones/LXV",
]
allowed_patterns = [
    "/informacion/votaciones",
    "/informacion/votaciones/LXII",
]

# ---------------------------------------------------------------------------
# Umbrales de réplicas
# ---------------------------------------------------------------------------
[thresholds]
status_success = 1
hash_consensus = 1
structure_ok = 1
latency_max_ms = 30000
