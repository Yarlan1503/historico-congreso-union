# config.toml — Configuración productiva del pipeline historico-congreso-union
# Formato: TOML 1.0
#
# Consumida por scraper/engine.py y scraper/cli.py.
# La config legacy f1/config/xp_config.toml se mantiene para scripts F1.

# ---------------------------------------------------------------------------
# Pool de User-Agent (engine usa built-in pool si está vacío)
# ---------------------------------------------------------------------------
# user_agent_pool = []  # Dejar vacío para usar pool built-in de engine (12+ UAs)

# ---------------------------------------------------------------------------
# Delay base y jitter por cámara (en milisegundos)
# ---------------------------------------------------------------------------
[delay.diputados]
base_ms = 500
jitter_ms = 300

[delay.senado]
base_ms = 800
jitter_ms = 400

# ---------------------------------------------------------------------------
# Backoff exponencial (en milisegundos)
# ---------------------------------------------------------------------------
[backoff]
base_ms = 1000
multiplier = 2.0
max_ms = 16000

# ---------------------------------------------------------------------------
# Timeouts por tipo de endpoint (en segundos)
# ---------------------------------------------------------------------------
[timeout_seconds]
index = 15.0
detail = 20.0
ajax = 10.0
download = 30.0

# ---------------------------------------------------------------------------
# Legislaturas soportadas — URLs base por cámara
# ---------------------------------------------------------------------------
[legislatures.LXVI]
leg_number = 66
description = "LXVI Legislatura (2024-2027)"
[legislatures.LXVI.urls.diputados]
sitl_index = "https://sitl.diputados.gob.mx/LXVI_leg/votacionesxperiodonplxvi.php?pert={periodo}"
sitl_aggregate = "https://sitl.diputados.gob.mx/LXVI_leg/estadistico_votacionnplxvi.php?votaciont={votacion_id}"
sitl_nominal = "https://sitl.diputados.gob.mx/LXVI_leg/listados_votacionesnplxvi.php?partidot={partidot}&votaciont={votacion_id}"
gaceta_base = "https://gaceta.diputados.gob.mx/Gaceta/Votaciones/66/"
# ⚠️  CRITICAL DOMAIN KNOWLEDGE (Nolan, 2026-04-26):
# El path /66/ en senado.gob.mx NO significa "Legislatura LXVI". El "66" refiere
# a la legislatura en que se migró la información legislativa al sitio actual por
# temas políticos. Los datos bajo /66/ abarcan de la LX a la LXVI Legislatura
# (votaciones 1-5001+). Confirmado: LX (1-666, 2006-2009), LXI (667-848),
# LXII-LXV (849-3696), LXIV (3697-3848), LXV-LXVI (3849+).
# NO confundir el /66/ del path con la legislatura de los datos contenidos.
# Esto fue discutido y aclarado múltiples veces — persistir este conocimiento.
[legislatures.LXVI.urls.senado]
base = "https://www.senado.gob.mx"
ajax = "https://www.senado.gob.mx/66/app/votaciones/functions/viewTableVot.php?action=ajax&cell=1&order=DESC&votacion={votacion_id}&q="
html = "https://www.senado.gob.mx/66/votacion/{votacion_id}"
[legislatures.LXVI.periods]
diputados_sitl = [1, 3, 5, 6, 8]

